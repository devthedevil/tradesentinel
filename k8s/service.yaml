apiVersion: v1
kind: Service
metadata:
  name: tradesentinel
  namespace: monitoring
spec:
  selector:
    app: tradesentinel
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradesentinel-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: tradesentinel.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tradesentinel
                port:
                  number: 80
