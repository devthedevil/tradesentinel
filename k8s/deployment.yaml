apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradesentinel
  namespace: monitoring
  labels:
    app: tradesentinel
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tradesentinel
  template:
    metadata:
      labels:
        app: tradesentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: tradesentinel
          image: ghcr.io/devthedevil/tradesentinel:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
